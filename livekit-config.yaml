# Public template: replace placeholders locally; keep real keys out of Git.
port: 7880
bind_addresses:
  - "0.0.0.0"

rtc:
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: true
  udp_port: 7882
  tcp_port: 7881
  # STUN Server für NAT Traversal (funktioniert ohne statische IP)
  stun_servers:
    - stun.l.google.com:19302
    - stun1.l.google.com:19302

keys:
  YOUR_LIVEKIT_API_KEY_HERE: YOUR_LIVEKIT_API_SECRET_HERE


room:
  auto_create: true
  empty_timeout: 300
  max_participants: 10

# Redis Configuration (required for SIP API)
redis:
  address: redis:6379


logging:
  level: debug
  sample: true

