; Asterisk PJSIP Configuration for Plusnet (Working Credentials)
; (Kommentare mit ';' statt '#', um WARNING zu vermeiden)

;===============================================
; Transport - UDP für SIP (extern zu Plusnet)
;===============================================
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; Externe Adressen für Plusnet-Kommunikation
external_media_address=79.216.182.86
external_signaling_address=79.216.182.86
local_net=172.20.0.0/16

;===============================================
; Plusnet SIP Trunk - Mit Outbound Registration
;===============================================
; Asterisk registriert sich bei Plusnet, damit Plusnet weiß, wo Anrufe hin sollen!

[plusnet-auth]
type=auth
auth_type=userpass
username=fo353810ip384131_00
password=sj1tkqhqU1

[plusnet-registration]
type=registration
transport=transport-udp
outbound_auth=plusnet-auth
server_uri=sip:sip.plusnet.de
client_uri=sip:fo353810ip384131_00@sip.plusnet.de
contact_user=fo353810ip384131_00
retry_interval=60
max_retries=20
auth_rejection_permanent=no
expiration=3600
line=no

;===============================================
; Plusnet Endpoint (für eingehende Anrufe)
;===============================================
[plusnet-endpoint]
type=endpoint
transport=transport-udp
context=from-plusnet
disallow=all
allow=ulaw,alaw,opus
from_user=fo353810ip384131_00
from_domain=sip.plusnet.de
outbound_auth=plusnet-auth
trust_id_inbound=yes
send_rpid=yes
rpid_immediate=yes
rewrite_contact=yes
force_rport=yes
rtp_symmetric=yes
direct_media=no
aors=plusnet-aor

[plusnet-aor]
type=aor
contact=sip:sip.plusnet.de

;===============================================
; Plusnet Identify - Erkenne eingehende Anrufe von Plusnet
;===============================================
[plusnet-identify]
type=identify
endpoint=plusnet-endpoint
match=92.197.182.17/32
match=92.197.177.18/32
match=92.197.177.16/32
match=92.197.182.18/32
match=92.197.182.16/32
match=92.197.176.18/32
match=92.197.177.17/32
match=92.197.182.19/32
match=92.197.177.19/32
match=92.197.176.19/32
match=92.197.176.16/32
match=92.197.176.17/32

[livekit-sip]
type=endpoint
transport=transport-udp
context=from-livekit
disallow=all
allow=ulaw,alaw,g722
aors=livekit-sip-aor
direct_media=no
rewrite_contact=yes
force_rport=no
rtp_symmetric=yes
; Media-Adresse für Docker-internes Netzwerk
media_address=172.20.0.10

[livekit-sip-aor]
type=aor
; LiveKit SIP Container läuft auf Port 5060 im Container, aber 5061 auf dem Host
; Im Docker-Netzwerk ist es erreichbar auf 172.20.0.5:5060
contact=sip:172.20.0.5:5060

;===============================================
; Legacy: livekit endpoint (für backwards compatibility)
;===============================================
[livekit]
type=endpoint
transport=transport-udp
context=from-livekit
disallow=all
allow=ulaw,alaw,g722
aors=livekit-aor
direct_media=no
rewrite_contact=yes
force_rport=no
rtp_symmetric=yes
; Media-Adresse für Docker-internes Netzwerk
media_address=172.20.0.10
; Kein Auth nötig für lokales Docker-Netzwerk

[livekit-aor]
type=aor
; Statische IP für LiveKit SIP Container (docker-compose)
contact=sip:172.20.0.5:5060
