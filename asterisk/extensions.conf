; Asterisk Dialplan for Fonial → LiveKit forwarding

[general]
static=yes
writeprotect=no
clearglobalvars=no

;===============================================
; Eingehende Anrufe von Fonial
;===============================================
[from-fonial]
exten => _X.,1,NoOp(Incoming call from Fonial: ${CALLERID(num)})
same => n,Set(CHANNEL(language)=de)
same => n,Answer()
same => n,Wait(1)
same => n,NoOp(Forwarding to LiveKit SIP)
; Forward zu LiveKit SIP Container - direkt zur IP
same => n,Dial(PJSIP/+4934198983401@livekit,60)
same => n,Hangup()

; Für deine spezifische Fonial-Nummer (falls zugewiesen)
exten => 101,1,NoOp(Call to extension 101)
same => n,Goto(from-fonial,s,1)

exten => s,1,NoOp(Generic incoming call from Fonial)
same => n,Set(CHANNEL(language)=de)
same => n,Answer()
same => n,Wait(1)
same => n,Dial(PJSIP/+4934198983401@livekit,60)
same => n,Hangup()

;===============================================
; Antworten von LiveKit (falls nötig)
;===============================================
[from-livekit]
exten => _X.,1,NoOp(Response from LiveKit)
same => n,Hangup()

;===============================================
; Eingehende Anrufe von Plusnet (per Identify -> plusnet-endpoint -> context=from-plusnet)
;===============================================
[from-plusnet]
; Deine DID explizit (falls Provider liefert mit +)
exten => +4934198983401,1,NoOp(Incoming DID +4934198983401 from Plusnet / Caller: ${CALLERID(num)})
 same => n,Set(CHANNEL(language)=de)
 same => n,NoOp(Forwarding to LiveKit SIP Endpoint 'livekit' mit DID)
 same => n,Dial(PJSIP/${CALLERID(num)}@livekit,120,g)
 same => n,NoOp(Dial result: ${DIALSTATUS})
 same => n,Hangup()

; Falls Provider ohne Plus sendet
exten => 4934198983401,1,Goto(+4934198983401,1)

; Extension für SIP-URI (Account) explizit
exten => fo353810ip384131_00,1,NoOp(Incoming SIP-Account fo353810ip384131_00 from Plusnet / Caller: ${CALLERID(num)})
 same => n,Set(CHANNEL(language)=de)
 same => n,NoOp(Forwarding to LiveKit SIP Endpoint 'livekit' für Account)
 same => n,Dial(PJSIP/${CALLERID(num)}@livekit,120,g)
 same => n,NoOp(Dial result: ${DIALSTATUS})
 same => n,Hangup()

; Catch-all Fallback (nur loggen, dann weiter)
exten => _X.,1,NoOp(Unknown inbound number ${EXTEN} from Plusnet - forwarding generically)
 same => n,Dial(PJSIP/${CALLERID(num)}@livekit,120,g)
 same => n,NoOp(Dial result: ${DIALSTATUS})
 same => n,Hangup()
