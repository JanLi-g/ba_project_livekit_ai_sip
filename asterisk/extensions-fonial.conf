# Asterisk Dialplan for Fonial → LiveKit forwarding

[general]
static=yes
writeprotect=no
clearglobalvars=no

;===============================================
; Eingehende Anrufe von Fonial
;===============================================
[from-fonial]
exten => _X.,1,NoOp(Incoming call from Fonial: ${CALLERID(num)})
same => n,Set(CHANNEL(language)=de)
same => n,Answer()
same => n,Wait(1)
same => n,NoOp(Forwarding to LiveKit SIP)
; Forward zu LiveKit SIP Container - direkt zur IP
same => n,Dial(PJSIP/sip:172.19.0.4:5060,60)
same => n,Hangup()

; Für deine spezifische Fonial-Nummer (falls zugewiesen)
exten => 101,1,NoOp(Call to extension 101)
same => n,Goto(from-fonial,s,1)

exten => s,1,NoOp(Generic incoming call from Fonial)
same => n,Set(CHANNEL(language)=de)
same => n,Answer()
same => n,Wait(1)
same => n,Dial(PJSIP/sip:172.19.0.4:5060,60)
same => n,Hangup()

;===============================================
; Antworten von LiveKit (falls nötig)
;===============================================
[from-livekit]
exten => _X.,1,NoOp(Response from LiveKit)
same => n,Hangup()

